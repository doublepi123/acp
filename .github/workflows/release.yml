name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0). Leave empty to auto-increment.'
        required: false

env:
  GO_VERSION: '1.22.0'
  PROJECT_NAME: acp

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: tag
        run: |
          git fetch --tags --force

          # If triggered by a tag push, use that tag
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            CURRENT_TAG="${GITHUB_REF_NAME}"
            echo "tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"
            echo "Using pushed tag: $CURRENT_TAG"
            exit 0
          fi

          # If manually triggered with a tag input, use it
          MANUAL_TAG="${{ github.event.inputs.tag }}"
          if [ -n "$MANUAL_TAG" ]; then
            echo "tag=$MANUAL_TAG" >> "$GITHUB_OUTPUT"
            echo "Using manual tag: $MANUAL_TAG"
            git tag "$MANUAL_TAG"
            git push origin "$MANUAL_TAG"
            exit 0
          fi

          # Otherwise auto-increment from the latest tag
          LAST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)
          LAST_TAG=${LAST_TAG:-v0.0.0}
          major=$(echo "$LAST_TAG" | cut -d. -f1 | tr -d v)
          minor=$(echo "$LAST_TAG" | cut -d. -f2)
          patch=$(echo "$LAST_TAG" | cut -d. -f3)
          new_patch=$((patch + 1))
          NEW_TAG="v${major}.${minor}.${new_patch}"
          while git rev-parse -q --verify "refs/tags/$NEW_TAG" >/dev/null; do
            new_patch=$((new_patch + 1))
            NEW_TAG="v${major}.${minor}.${new_patch}"
          done
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Created tag: $NEW_TAG"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

  build:
    runs-on: ubuntu-latest
    needs: tag
    strategy:
      matrix:
        goos:
          - darwin
          - linux
          - windows
        goarch:
          - amd64
          - arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.tag.outputs.tag }}
        run: |
          EXTENSION=""
          if [ "$GOOS" = "windows" ]; then
            EXTENSION=".exe"
          fi
          OUTPUT_NAME="${{ env.PROJECT_NAME }}-${GOOS}-${GOARCH}${EXTENSION}"
          go build -ldflags="-s -w" -o "$OUTPUT_NAME" ./cmd/acp

          if [ "$GOOS" = "windows" ]; then
            mv "$OUTPUT_NAME" "acp.exe"
            zip "${{ env.PROJECT_NAME }}-${GOOS}-${GOARCH}.zip" "acp.exe"
          else
            mv "$OUTPUT_NAME" acp
            tar czf "${{ env.PROJECT_NAME }}-${GOOS}-${GOARCH}.tar.gz" acp
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ env.PROJECT_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            ${{ env.PROJECT_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip
          retention-days: 90

  release:
    runs-on: ubuntu-latest
    needs:
      - tag
      - build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec sha256sum {} \; | sed 's| \./[^/]*/|  |' > ../checksums.txt
          cat ../checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: ${{ needs.tag.outputs.tag }}
          draft: false
          generate_release_notes: true
          files: |
            checksums.txt
            artifacts/${{ env.PROJECT_NAME }}-darwin-amd64/${{ env.PROJECT_NAME }}-darwin-amd64.tar.gz
            artifacts/${{ env.PROJECT_NAME }}-darwin-arm64/${{ env.PROJECT_NAME }}-darwin-arm64.tar.gz
            artifacts/${{ env.PROJECT_NAME }}-linux-amd64/${{ env.PROJECT_NAME }}-linux-amd64.tar.gz
            artifacts/${{ env.PROJECT_NAME }}-linux-arm64/${{ env.PROJECT_NAME }}-linux-arm64.tar.gz
            artifacts/${{ env.PROJECT_NAME }}-windows-amd64/${{ env.PROJECT_NAME }}-windows-amd64.zip
            artifacts/${{ env.PROJECT_NAME }}-windows-arm64/${{ env.PROJECT_NAME }}-windows-arm64.zip
